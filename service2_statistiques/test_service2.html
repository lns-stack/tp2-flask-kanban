<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Tests Service 2 — Statistiques</title>
  <style>
    body { font-family: monospace; background: #1e1e2e; color: #cdd6f4; padding: 24px; margin: 0; }
    h1   { color: #cba6f7; }
    .pass  { color: #a6e3a1; }
    .fail  { color: #f38ba8; }
    .info  { color: #89dceb; font-size: 0.85em; }
    button { background: #cba6f7; border: none; color: #1e1e2e; padding: 10px 22px;
             border-radius: 6px; cursor: pointer; font-size: 1em; margin-top: 12px; }
    button:hover { background: #b4befe; }
    pre  { background: #313244; padding: 10px; border-radius: 6px; overflow-x: auto; font-size: 0.82em; }
    #results { margin-top: 20px; }
    .test-block { margin-bottom: 10px; padding: 8px 12px; border-radius: 6px; background: #25253a; }
    #summary { font-size: 1.1em; margin-top: 20px; padding: 12px; border-radius: 8px; background: #313244; }
  </style>
</head>
<body>
  <h1>🧪 Tests Service 2 — Statistiques JSON</h1>
  <p class="info">⚠️ Service Flask requis sur <strong>http://localhost:5002</strong></p>
  <button onclick="lancerTests()">▶ Lancer tous les tests</button>
  <div id="results"></div>
  <div id="summary"></div>

<script>
const BASE = "http://localhost:5002";
let pass = 0, fail = 0;

async function post(route, body) {
  const r = await fetch(BASE + route, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  return { status: r.status, data: await r.json() };
}

function afficher(nom, ok, detail) {
  const div = document.createElement("div");
  div.className = "test-block";
  div.innerHTML = `<span class="${ok ? 'pass' : 'fail'}">${ok ? "✅" : "❌"} ${nom}</span>
    <pre>${JSON.stringify(detail, null, 2)}</pre>`;
  document.getElementById("results").appendChild(div);
  ok ? pass++ : fail++;
}

const DATA = [12.5, 15.3, 8.7, 21.0, 13.2, 9.8, 17.6, 11.4];

async function lancerTests() {
  pass = 0; fail = 0;
  document.getElementById("results").innerHTML = "";
  document.getElementById("summary").innerHTML = "⏳ En cours...";

  let r;

  // ── /stats/describe ──────────────────────────────────────────
  r = await post("/stats/describe", { data: DATA });
  afficher("Describe — données valides (200)", r.status === 200 && r.data.resultat.n === 8, r.data);

  r = await post("/stats/describe", { valeurs: DATA });
  afficher("Describe — clé 'data' manquante (400)", r.status === 400, r.data);

  r = await post("/stats/describe", { data: [42.0] });
  afficher("Describe — liste trop courte (400)", r.status === 400, r.data);

  // ── /stats/correlation ────────────────────────────────────────
  r = await post("/stats/correlation", { x: [1,2,3,4,5], y: [2,4,5,4,5] });
  afficher("Corrélation — résultat valide (200)", r.status === 200 && "r" in r.data.resultat, r.data);

  r = await post("/stats/correlation", { x: [1,2,3], y: [4,5] });
  afficher("Corrélation — longueurs différentes (400)", r.status === 400, r.data);

  // ── /stats/test_normalite ─────────────────────────────────────
  r = await post("/stats/test_normalite", { data: DATA });
  afficher("Test normalité (200)", r.status === 200 && "est_normale" in r.data.resultat, r.data);

  r = await post("/stats/test_normalite", { data: [1.0] });
  afficher("Test normalité — trop court (400)", r.status === 400, r.data);

  // ── /stats/test_student ───────────────────────────────────────
  r = await post("/stats/test_student", { groupe1: [10,11,12,13], groupe2: [20,21,22,23] });
  afficher("Test Student — valide (200)", r.status === 200 && "difference_significative" in r.data.resultat, r.data);

  r = await post("/stats/test_student", { groupe1: [10,11,12] });
  afficher("Test Student — groupe2 manquant (400)", r.status === 400, r.data);

  document.getElementById("summary").innerHTML =
    `<span class="${fail === 0 ? 'pass' : 'fail'}">
      Résultat : ${pass} ✅ réussi(s) — ${fail} ❌ échoué(s)
    </span>`;
}
</script>
</body>
</html>
